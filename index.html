<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hand Mesh Visualizer</title>
  <style>
    :root {
      --bg-color: #0d1117;
      --accent: #58a6ff;
    }
    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-color);
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    .header {
      position: absolute;
      top: 20px;
      text-align: center;
      z-index: 10;
      background: rgba(13, 17, 23, 0.7);
      backdrop-filter: blur(10px);
      padding: 15px 30px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
    }
    h1 {
      margin: 0;
      font-size: 1.5rem;
      background: linear-gradient(90deg, #ff7e5f, #feb47b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      margin: 5px 0 0 0;
      font-size: 0.9rem;
      color: #8b949e;
    }
    .container {
      position: relative;
      width: 100%;
      max-width: 1280px;
      aspect-ratio: 16/9;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    video {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
      border-radius: 20px;
      box-shadow: 0 10px 50px rgba(0, 0, 0, 0.5);
    }
    canvas {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
      z-index: 5;
    }
    #loading {
      position: absolute;
      z-index: 20;
      font-size: 1.2rem;
      font-weight: bold;
      color: var(--accent);
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0% { opacity: 0.5; transform: scale(0.95); }
      50% { opacity: 1; transform: scale(1.05); }
      100% { opacity: 0.5; transform: scale(0.95); }
    }
    .controls {
      position: absolute;
      bottom: 30px;
      z-index: 10;
    }
    button {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(88, 166, 255, 0.4);
    }
    button:hover {
      background: #79b8ff;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(88, 166, 255, 0.6);
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Hand Mesh Visualizer</h1>
    <p>Bring both hands into view to bridge them with rainbow energy!</p>
  </div>

  <div class="container" id="video-container">
    <div id="loading">Initialize Camera & AI...</div>
    <video id="webcam" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>
  </div>

  <div class="controls" id="controls" style="display: none;">
    <button id="webcamButton">Enable Webcam</button>
  </div>

  <script type="module">
    import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

    const video = document.getElementById("webcam");
    const canvasElement = document.getElementById("output_canvas");
    const canvasCtx = canvasElement.getContext("2d");
    const loadingText = document.getElementById("loading");
    const enableWebcamButton = document.getElementById("webcamButton");
    const controls = document.getElementById("controls");

    let handLandmarker = undefined;
    let runningMode = "VIDEO";
    let webcamRunning = false;
    let lastVideoTime = -1;

    // Standard connections (blue skeleton)
    const HAND_CONNECTIONS = [
      [0, 1], [1, 2], [2, 3], [3, 4],
      [0, 5], [5, 6], [6, 7], [7, 8],
      [5, 9], [9, 10], [10, 11], [11, 12],
      [9, 13], [13, 14], [14, 15], [15, 16],
      [13, 17], [0, 17], [17, 18], [18, 19], [19, 20]
    ];

    // Hue helper
    function getHsvColor(index, maxIndex) {
      const h = (index / maxIndex) * 360;
      return `hsl(${h}, 100%, 60%)`;
    }

    const createHandLandmarker = async () => {
      const vision = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
      );
      handLandmarker = await HandLandmarker.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
          delegate: "GPU"
        },
        runningMode: runningMode,
        numHands: 2,
        minHandDetectionConfidence: 0.5,
        minHandPresenceConfidence: 0.5,
        minTrackingConfidence: 0.5
      });
      loadingText.style.display = "none";
      
      // Check if webcam access is supported
      if (!!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia)) {
        controls.style.display = "block";
        // Auto-click it to start instantly
        enableWebcamButton.click(); 
      } else {
        loadingText.innerHTML = "getUserMedia() is not supported by your browser";
        loadingText.style.display = "block";
      }
    };

    createHandLandmarker();

    enableWebcamButton.addEventListener("click", () => {
      if (!handLandmarker) return;
      
      if (webcamRunning === true) {
        webcamRunning = false;
        enableWebcamButton.innerText = "Enable Webcam";
        video.srcObject.getTracks().forEach((track) => track.stop());
      } else {
        webcamRunning = true;
        enableWebcamButton.innerText = "Stop Webcam";
        
        navigator.mediaDevices.getUserMedia({ video: true }).then((stream) => {
          video.srcObject = stream;
          video.addEventListener("loadeddata", predictWebcam);
        });
      }
    });

    async function predictWebcam() {
      if (video.videoWidth === 0 || video.videoHeight === 0) {
          window.requestAnimationFrame(predictWebcam);
          return;
      }
      
      canvasElement.width = video.videoWidth;
      canvasElement.height = video.videoHeight;
      
      let startTimeMs = performance.now();
      
      if (lastVideoTime !== video.currentTime) {
        lastVideoTime = video.currentTime;
        const results = handLandmarker.detectForVideo(video, startTimeMs);

        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

        if (results.landmarks) {
          const hands = results.landmarks;
          
          // 1. Draw Intra-hand clean skeleton
          for (let points of hands) {
            canvasCtx.strokeStyle = "rgba(88, 166, 255, 0.8)"; // Blue
            canvasCtx.lineWidth = 3;
            canvasCtx.beginPath();
            for (let [idx_1, idx_2] of HAND_CONNECTIONS) {
              if (points[idx_1] && points[idx_2]) {
                canvasCtx.moveTo(points[idx_1].x * canvasElement.width, points[idx_1].y * canvasElement.height);
                canvasCtx.lineTo(points[idx_2].x * canvasElement.width, points[idx_2].y * canvasElement.height);
              }
            }
            canvasCtx.stroke();
          }

          // 2. Draw Inter-hand rainbow connections
          if (hands.length >= 2) {
            const pts1 = hands[0];
            const pts2 = hands[1];
            
            const maxLen = Math.min(pts1.length, pts2.length);
            for (let i = 0; i < maxLen; i++) {
              canvasCtx.strokeStyle = getHsvColor(i, 21);
              canvasCtx.lineWidth = 3;
              canvasCtx.beginPath();
              canvasCtx.moveTo(pts1[i].x * canvasElement.width, pts1[i].y * canvasElement.height);
              canvasCtx.lineTo(pts2[i].x * canvasElement.width, pts2[i].y * canvasElement.height);
              canvasCtx.stroke();
            }
          }

          // 3. Draw dots
          for (let points of hands) {
             for (let lm of points) {
                canvasCtx.fillStyle = "#00ff00"; // Green
                canvasCtx.beginPath();
                canvasCtx.arc(lm.x * canvasElement.width, lm.y * canvasElement.height, 4, 0, 2 * Math.PI);
                canvasCtx.fill();
             }
          }
        }
        canvasCtx.restore();
      }
      
      if (webcamRunning === true) {
        window.requestAnimationFrame(predictWebcam);
      }
    }
  </script>
</body>
</html>
